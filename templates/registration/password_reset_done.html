{% extends "base.html" %}

{% block title %}Check Your Email{% endblock %}

{% block content %}
<div class="container py-5 text-center" style="max-width: 600px;">
    <div class="card border-0 shadow-sm"><div class="card-body p-4 p-md-5">
        <h1 class="h2">Check Your Email</h1>
        <p class="text-muted">If an account exists with this email, a password reset link has been sent.</p>
        <a class="btn btn-outline-primary" href="{% url 'login' %}">Back to Login</a>
    </div></div>
</div>
{% endblock %}
