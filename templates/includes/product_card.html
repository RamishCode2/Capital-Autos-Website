<div class="card h-100">
    {% if product.image %}
        <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}">
    {% endif %}

    <div class="card-body">
        <h5>{{ product.name }}</h5>
        <p>Rs. {{ product.price }}</p>

        <a href="{% url 'product_detail' product.id %}" class="btn btn-primary">
            View Details
        </a>
    </div>
</div>
