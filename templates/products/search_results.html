{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">

        Search Results

        {% if query %}
            for "{{ query }}"
        {% endif %}

    </h2>

    <div class="row">

        {% for product in products %}

            {% include "includes/product_card.html" %}

        {% empty %}

            <div class="text-center py-5">

                <h3>No products found.</h3>

                <p class="text-muted">

                    Try another keyword.

                </p>

            </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
