{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-2">
        {{ car_model.brand.name }}
    </h2>

    <h4 class="text-muted mb-4">
        {{ car_model.name }}
    </h4>

    <div class="row">

        {% for category in categories %}

        <div class="col-md-4 mb-4">

            <div class="card shadow-sm h-100">

                {% if category.image %}
                <img src="{{ category.image.url }}"
                     class="card-img-top"
                     style="height:180px;object-fit:contain;padding:20px;">
                {% endif %}

                <div class="card-body text-center">

                    <h5>{{ category.name }}</h5>

                    <a href="{% url 'product_list' car_model.id category.id %}"
                       class="btn btn-dark mt-3">
                        View Products
                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="col-12">
            <div class="alert alert-warning">
                No categories available for this vehicle.
            </div>
        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
